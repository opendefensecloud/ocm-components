# cert-manager Production Configuration
# High availability, security hardening, monitoring, and resource tuning

# Install CRDs with Helm
crds:
  enabled: true

# Controller - HA with 2 replicas
replicaCount: 2

# Controller resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Leader election for HA controller
# Enabled by default, ensures only one controller processes at a time

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Topology spread for zone distribution
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: cert-manager
        app.kubernetes.io/component: controller

# Pod anti-affinity for spreading across nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cert-manager
              app.kubernetes.io/component: controller
          topologyKey: kubernetes.io/hostname

# Security context
securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

# Webhook - HA with 3 replicas (critical path)
webhook:
  replicaCount: 3
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: cert-manager
          app.kubernetes.io/component: webhook
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
  # Increase timeout for webhook in large clusters
  timeoutSeconds: 30

# CA Injector - HA with 2 replicas
cainjector:
  replicaCount: 2
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: cert-manager
          app.kubernetes.io/component: cainjector
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true

# Startup API Check
startupapicheck:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

# Prometheus monitoring
prometheus:
  enabled: true
  servicemonitor:
    enabled: true
    interval: 30s
    labels: {}

# Production logging - structured JSON
global:
  logLevel: 2

# DNS01 solver configuration (uncomment if using private DNS)
# dns01RecursiveNameservers: "8.8.8.8:53,1.1.1.1:53"
# dns01RecursiveNameserversOnly: true

# Feature gates for production
featureGates: ""

# Max concurrent challenges for better throughput
maxConcurrentChallenges: 60
