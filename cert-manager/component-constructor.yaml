components:
  - name: opendefense.cloud/cert-manager
    provider:
      name: cert-manager.io
    labels:
      - name: app.kubernetes.io/name
        value: cert-manager
      - name: app.kubernetes.io/component
        value: certificate-management
      - name: app.kubernetes.io/part-of
        value: cert-manager
    resources:
      # ResourceGraphDefinition for KRO bootstrapping
      - name: cert-manager-rgd
        type: yaml
        relation: local
        input:
          type: file
          path: rgd-template.yaml

      # cert-manager Helm Chart (official jetstack)
      - name: cert-manager-chart
        type: helmChart
        version: 1.20.1
        relation: external
        access:
          type: helm
          helmChart: cert-manager:v1.20.1
          helmRepository: https://charts.jetstack.io

      # cert-manager Controller Image
      - name: cert-manager-controller-image
        type: ociImage
        version: 1.20.1
        relation: external
        access:
          type: ociArtifact
          imageReference: quay.io/jetstack/cert-manager-controller:v1.20.2

      # cert-manager Webhook Image
      - name: cert-manager-webhook-image
        type: ociImage
        version: 1.20.1
        relation: external
        access:
          type: ociArtifact
          imageReference: quay.io/jetstack/cert-manager-webhook:v1.20.2

      # cert-manager CA Injector Image
      - name: cert-manager-cainjector-image
        type: ociImage
        version: 1.20.1
        relation: external
        access:
          type: ociArtifact
          imageReference: quay.io/jetstack/cert-manager-cainjector:v1.20.2

      # cert-manager ACME Solver Image
      - name: cert-manager-acmesolver-image
        type: ociImage
        version: 1.20.1
        relation: external
        access:
          type: ociArtifact
          imageReference: quay.io/jetstack/cert-manager-acmesolver:v1.20.2

      # cert-manager Startup API Check Image
      - name: cert-manager-startupapicheck-image
        type: ociImage
        version: 1.20.1
        relation: external
        access:
          type: ociArtifact
          imageReference: quay.io/jetstack/cert-manager-startupapicheck:v1.20.2

      # Minimal Configuration (development/testing)
      - name: cert-manager-minimal-config
        type: yaml
        relation: local
        input:
          type: file
          path: values-minimal.yaml

      # Production Configuration (HA, security hardening)
      - name: cert-manager-production-config
        type: yaml
        relation: local
        input:
          type: file
          path: values-production.yaml
