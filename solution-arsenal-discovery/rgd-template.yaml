apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: solution-arsenal-discovery-bootstrap
  namespace: default
spec:
  schema:
    apiVersion: v1alpha1
    kind: SolutionArsenalDiscoveryBootstrap
    spec:
      # Component reference configuration
      registry:
        url:
          type: string
          default: "ghcr.io"
      componentName:
        type: string
        default: "opendefense.cloud/solution-arsenal-discovery"
      componentVersion:
        type: string
        default: "0.1.0"

      # Deployment configuration
      namespace:
        type: string
        default: "solar-system"

      # Configuration profile selection
      deploymentProfile:
        type: string
        enum: ["minimal", "production"]
        default: "minimal"

      # Replica configuration
      replicaCount:
        type: integer
        minimum: 1
        maximum: 10
        default: 1

      # Webhook listener configuration
      webhookServiceEnabled:
        type: boolean
        default: true
      webhookServicePort:
        type: integer
        default: 8080

      # CA bundle for TLS connections to registries
      caBundleEnabled:
        type: boolean
        default: false
      caBundleConfigMapName:
        type: string
        default: ""
      caBundleKey:
        type: string
        default: "trust-bundle.pem"

      # Credentials configuration
      ocmConfigSecretName:
        type: string
        default: ""

  resources:
    # OCM Repository resource
    - id: ocm-repository
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Repository
      metadata:
        name: solution-arsenal-discovery-repo
        namespace: ${schema.spec.namespace}
      spec:
        url: oci://${schema.spec.registry.url}
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Component resource
    - id: ocm-component
      dependsOn:
        - ocm-repository
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Component
      metadata:
        name: solution-arsenal-discovery-component
        namespace: ${schema.spec.namespace}
      spec:
        component: ${schema.spec.componentName}
        version: ${schema.spec.componentVersion}
        repository:
          name: solution-arsenal-discovery-repo
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Resource - Fetch Helm Chart
    - id: helm-chart-resource
      dependsOn:
        - ocm-component
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: solution-arsenal-discovery-chart
        namespace: ${schema.spec.namespace}
      spec:
        resource: solution-arsenal-discovery-chart
        component:
          name: solution-arsenal-discovery-component
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Resource - Fetch Discovery Image metadata
    - id: discovery-image-resource
      dependsOn:
        - ocm-component
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: solution-arsenal-discovery-image
        namespace: ${schema.spec.namespace}
      spec:
        resource: solution-arsenal-discovery-image
        component:
          name: solution-arsenal-discovery-component
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Resource - Fetch configuration values
    - id: config-resource
      dependsOn:
        - ocm-component
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: solution-arsenal-discovery-config
        namespace: ${schema.spec.namespace}
      spec:
        resource: solution-arsenal-discovery-${schema.spec.deploymentProfile}-config
        component:
          name: solution-arsenal-discovery-component
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # Namespace for SolutionArsenal Discovery deployment
    - id: solution-arsenal-discovery-namespace
      apiVersion: v1
      kind: Namespace
      metadata:
        name: ${schema.spec.namespace}
        labels:
          app.kubernetes.io/name: solution-arsenal-discovery
          app.kubernetes.io/managed-by: kro

    # FluxCD OCIRepository - Watch Helm chart location
    - id: oci-repository
      dependsOn:
        - helm-chart-resource
        - solution-arsenal-discovery-namespace
      apiVersion: source.toolkit.fluxcd.io/v1beta2
      kind: OCIRepository
      metadata:
        name: solution-arsenal-discovery-chart
        namespace: ${schema.spec.namespace}
      spec:
        interval: 10m
        url: ${resources.helmChartResource.status.access.imageReference}
        ref:
          tag: ${schema.spec.componentVersion}
        provider: generic
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # ConfigMap with base configuration values from OCM component
    - id: base-config
      dependsOn:
        - config-resource
        - solution-arsenal-discovery-namespace
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: solution-arsenal-discovery-base-config
        namespace: ${schema.spec.namespace}
      data:
        values.yaml: ${resources.configResource.status.content}

    # FluxCD HelmRelease - Deploy SolutionArsenal Discovery with localized image
    - id: helm-release
      dependsOn:
        - oci-repository
        - discovery-image-resource
        - base-config
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: solution-arsenal-discovery
        namespace: ${schema.spec.namespace}
      spec:
        interval: 10m
        timeout: 10m
        chart:
          spec:
            chart: solar-discovery
            version: ${schema.spec.componentVersion}
            sourceRef:
              kind: OCIRepository
              name: solution-arsenal-discovery-chart
              namespace: ${schema.spec.namespace}

        # Merge base configuration with localized image references
        valuesFrom:
          - kind: ConfigMap
            name: solution-arsenal-discovery-base-config
            optional: false

        values:
          # Override image with localized reference from OCM
          replicaCount: ${schema.spec.replicaCount}
          image:
            repository: ${resources.discoveryImageResource.status.access.imageReference | split(":")[0]}
            tag: ${resources.discoveryImageResource.status.access.imageReference | split(":")[1]}

          # Webhook service configuration
          service:
            enabled: ${schema.spec.webhookServiceEnabled}
            type: ClusterIP
            port: ${schema.spec.webhookServicePort}

          # CA bundle for registry TLS
          caBundle:
            enabled: ${schema.spec.caBundleEnabled}
            configMapName: ${schema.spec.caBundleConfigMapName}
            key: ${schema.spec.caBundleKey}

  status:
    conditions:
      - type: Ready
        reason: AllResourcesReady
        message: "All SolutionArsenal Discovery resources are deployed and ready"
