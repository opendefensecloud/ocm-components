---
# Bootstrap configuration for SolutionArsenal Discovery component deployment
# This file uses OCM K8s Toolkit to fetch and deploy the ResourceGraphDefinition
# from the OCM component, enabling self-contained deployment with automatic
# image localization when components are transferred between registries.

apiVersion: v1
kind: Namespace
metadata:
  name: ocm-system
---
# Optional: Secret for private registry access
# Uncomment and configure if using a private OCI registry
# apiVersion: v1
# kind: Secret
# metadata:
#   name: ocm-registry-credentials
#   namespace: ocm-system
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: <base64-encoded-docker-config>
---
# OCM Repository - Points to the OCI registry containing OCM components
apiVersion: delivery.ocm.software/v1alpha1
kind: Repository
metadata:
  name: solution-arsenal-discovery-repo
  namespace: ocm-system
spec:
  # Replace with your OCM registry URL
  url: oci://ghcr.io/your-org/ocm-components
  # Optional: Reference secret for private registry access
  # secretRef:
  #   name: ocm-registry-credentials
---
# OCM Component - References the specific SolutionArsenal Discovery component
apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: solution-arsenal-discovery-component
  namespace: ocm-system
spec:
  component: opendefense.cloud/solution-arsenal-discovery
  version: 0.1.0
  repository:
    name: solution-arsenal-discovery-repo
  # Optional: Reference secret for private registry access
  # secretRef:
  #   name: ocm-registry-credentials
---
# OCM Resource - Fetches the ResourceGraphDefinition from the component
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  name: solution-arsenal-discovery-rgd
  namespace: ocm-system
spec:
  resource: solution-arsenal-discovery-rgd
  component:
    name: solution-arsenal-discovery-component
  # Optional: Reference secret for private registry access
  # secretRef:
  #   name: ocm-registry-credentials
---
# OCM Deployer - Applies the RGD content to the cluster
# Note: This is a cluster-scoped operation that creates the RGD CRD
apiVersion: delivery.ocm.software/v1alpha1
kind: Deployer
metadata:
  name: solution-arsenal-discovery-rgd-deployer
  namespace: ocm-system
spec:
  resource:
    name: solution-arsenal-discovery-rgd
  # Optional: Reference secret for private registry access
  # secretRef:
  #   name: ocm-registry-credentials
---
# Example SolutionArsenal Discovery Bootstrap instance - Minimal configuration
# Deploys a single scanner instance in scan-only mode
apiVersion: v1alpha1
kind: SolutionArsenalDiscoveryBootstrap
metadata:
  name: solution-arsenal-discovery-minimal
  namespace: default
spec:
  # Registry configuration
  registry:
    url: ghcr.io  # Replace with your registry if using a private one

  # Component reference
  componentName: opendefense.cloud/solution-arsenal-discovery
  componentVersion: 0.1.0

  # Deployment configuration
  namespace: solar-system

  # Use minimal profile for development/testing
  deploymentProfile: minimal

  # Single replica for minimal setup
  replicaCount: 1

  # Webhook service enabled (but no registries configured yet)
  webhookServiceEnabled: true
  webhookServicePort: 8080

  # CA bundle disabled for minimal setup
  caBundleEnabled: false

  # Optional: Reference to OCM config secret for private registries
  # ocmConfigSecretName: ocm-registry-credentials
---
# Example SolutionArsenal Discovery Bootstrap instance - Production configuration
# Uncomment to deploy a production-grade setup with anti-affinity
# apiVersion: v1alpha1
# kind: SolutionArsenalDiscoveryBootstrap
# metadata:
#   name: solution-arsenal-discovery-production
#   namespace: default
# spec:
#   # Registry configuration
#   registry:
#     url: ghcr.io
#
#   # Component reference
#   componentName: opendefense.cloud/solution-arsenal-discovery
#   componentVersion: 0.1.0
#
#   # Deployment configuration
#   namespace: solution-arsenal-system
#
#   # Use production profile
#   deploymentProfile: production
#
#   # 2 replicas for redundancy
#   replicaCount: 2
#
#   # Webhook listener enabled for event-driven discovery
#   webhookServiceEnabled: true
#   webhookServicePort: 8080
#
#   # CA bundle for private registry TLS
#   caBundleEnabled: true
#   caBundleConfigMapName: registry-ca-bundle
#   caBundleKey: trust-bundle.pem
#
#   # Optional: Reference to OCM config secret for private registries
#   # ocmConfigSecretName: ocm-registry-credentials
