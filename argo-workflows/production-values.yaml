# Argo Workflows Production Configuration
# HA setup: multiple replicas, client auth (k8s RBAC), workflow archive,
# Prometheus monitoring, PodDisruptionBudgets, pod anti-affinity.
#
# Auth note: authModes is set to "client" (Kubernetes service account tokens).
# To use SSO/OIDC instead, change authModes to ["sso"] and configure server.sso.*
# with your OIDC provider details.

crds:
  install: true
  keep: true

# Create a dedicated service account and RBAC for workflow pods
workflow:
  serviceAccount:
    create: true
  rbac:
    create: true

controller:
  replicas: 2
  image:
    registry: quay.io
    repository: argoproj/workflow-controller
    tag: "v4.0.5"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Limit total concurrent workflows across the cluster
  parallelism: 50
  serviceMonitor:
    enabled: true
  pdb:
    enabled: true
    minAvailable: 1
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app: workflow-controller
            topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app: workflow-controller

executor:
  image:
    registry: quay.io
    repository: argoproj/argoexec
    tag: "v4.0.5"
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi

server:
  enabled: true
  replicas: 2
  image:
    registry: quay.io
    repository: argoproj/argocli
    tag: "v4.0.5"
  # client mode: enforces Kubernetes RBAC via service account tokens
  authModes:
    - client
  # SSO/OIDC alternative — uncomment and configure if an OIDC provider is available:
  # authModes:
  #   - sso
  # sso:
  #   issuer: https://your-oidc-provider
  #   clientId:
  #     name: argo-workflows-sso
  #     key: client-id
  #   clientSecret:
  #     name: argo-workflows-sso
  #     key: client-secret
  #   redirectUrl: https://argo-workflows.example.com/oauth2/callback
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    minAvailable: 1
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app: argo-server
            topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app: argo-server
