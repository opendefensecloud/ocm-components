apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: solution-arsenal-bootstrap
  namespace: default
spec:
  schema:
    apiVersion: v1alpha1
    kind: SolutionArsenalBootstrap
    spec:
      # Component reference configuration
      registry:
        url:
          type: string
          default: "ghcr.io"
      componentName:
        type: string
        default: "opendefense.cloud/solution-arsenal"
      componentVersion:
        type: string
        default: "0.1.0"

      # Deployment configuration
      namespace:
        type: string
        default: "solar-system"

      # Configuration profile selection
      deploymentProfile:
        type: string
        enum: ["minimal", "production"]
        default: "minimal"

      # API Server configuration
      apiServerReplicas:
        type: integer
        minimum: 1
        maximum: 10
        default: 1

      # Controller Manager configuration
      controllerReplicas:
        type: integer
        minimum: 1
        maximum: 10
        default: 1

      # etcd configuration
      etcdReplicas:
        type: integer
        minimum: 1
        maximum: 10
        default: 1
      etcdStorageSize:
        type: string
        default: "1Gi"
      etcdStorageClass:
        type: string
        default: ""

      # Metrics / monitoring configuration
      metricsEnabled:
        type: boolean
        default: false
      prometheusEnabled:
        type: boolean
        default: false

      # cert-manager integration
      certManagerEnabled:
        type: boolean
        default: true

      # Credentials configuration
      ocmConfigSecretName:
        type: string
        default: ""

  resources:
    # OCM Repository resource
    - id: ocm-repository
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Repository
      metadata:
        name: solution-arsenal-repo
        namespace: ${schema.spec.namespace}
      spec:
        url: oci://${schema.spec.registry.url}
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Component resource
    - id: ocm-component
      dependsOn:
        - ocm-repository
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Component
      metadata:
        name: solution-arsenal-component
        namespace: ${schema.spec.namespace}
      spec:
        component: ${schema.spec.componentName}
        version: ${schema.spec.componentVersion}
        repository:
          name: solution-arsenal-repo
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Resource - Fetch Helm Chart
    - id: helm-chart-resource
      dependsOn:
        - ocm-component
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: solution-arsenal-chart
        namespace: ${schema.spec.namespace}
      spec:
        resource: solution-arsenal-chart
        component:
          name: solution-arsenal-component
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Resource - Fetch API Server Image metadata
    - id: apiserver-image-resource
      dependsOn:
        - ocm-component
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: solution-arsenal-apiserver-image
        namespace: ${schema.spec.namespace}
      spec:
        resource: solution-arsenal-apiserver-image
        component:
          name: solution-arsenal-component
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Resource - Fetch Controller Manager Image metadata
    - id: controller-image-resource
      dependsOn:
        - ocm-component
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: solution-arsenal-controller-image
        namespace: ${schema.spec.namespace}
      spec:
        resource: solution-arsenal-controller-manager-image
        component:
          name: solution-arsenal-component
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Resource - Fetch Renderer Image metadata
    - id: renderer-image-resource
      dependsOn:
        - ocm-component
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: solution-arsenal-renderer-image
        namespace: ${schema.spec.namespace}
      spec:
        resource: solution-arsenal-renderer-image
        component:
          name: solution-arsenal-component
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Resource - Fetch etcd Image metadata
    - id: etcd-image-resource
      dependsOn:
        - ocm-component
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: solution-arsenal-etcd-image
        namespace: ${schema.spec.namespace}
      spec:
        resource: etcd-image
        component:
          name: solution-arsenal-component
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # OCM Resource - Fetch configuration values
    - id: config-resource
      dependsOn:
        - ocm-component
      apiVersion: delivery.ocm.software/v1alpha1
      kind: Resource
      metadata:
        name: solution-arsenal-config
        namespace: ${schema.spec.namespace}
      spec:
        resource: solution-arsenal-${schema.spec.deploymentProfile}-config
        component:
          name: solution-arsenal-component
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # Namespace for SolutionArsenal deployment
    - id: solution-arsenal-namespace
      apiVersion: v1
      kind: Namespace
      metadata:
        name: ${schema.spec.namespace}
        labels:
          app.kubernetes.io/name: solution-arsenal
          app.kubernetes.io/managed-by: kro

    # FluxCD OCIRepository - Watch Helm chart location
    - id: oci-repository
      dependsOn:
        - helm-chart-resource
        - solution-arsenal-namespace
      apiVersion: source.toolkit.fluxcd.io/v1beta2
      kind: OCIRepository
      metadata:
        name: solution-arsenal-chart
        namespace: ${schema.spec.namespace}
      spec:
        interval: 10m
        url: ${resources.helmChartResource.status.access.imageReference}
        ref:
          tag: ${schema.spec.componentVersion}
        provider: generic
        secretRef:
          name: ${schema.spec.ocmConfigSecretName}

    # ConfigMap with base configuration values from OCM component
    - id: base-config
      dependsOn:
        - config-resource
        - solution-arsenal-namespace
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: solution-arsenal-base-config
        namespace: ${schema.spec.namespace}
      data:
        values.yaml: ${resources.configResource.status.content}

    # FluxCD HelmRelease - Deploy SolutionArsenal with localized images
    - id: helm-release
      dependsOn:
        - oci-repository
        - apiserver-image-resource
        - controller-image-resource
        - renderer-image-resource
        - etcd-image-resource
        - base-config
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: solution-arsenal
        namespace: ${schema.spec.namespace}
      spec:
        interval: 10m
        timeout: 10m
        chart:
          spec:
            chart: solar
            version: ${schema.spec.componentVersion}
            sourceRef:
              kind: OCIRepository
              name: solution-arsenal-chart
              namespace: ${schema.spec.namespace}

        # Merge base configuration with localized image references
        valuesFrom:
          - kind: ConfigMap
            name: solution-arsenal-base-config
            optional: false

        values:
          # Override images with localized references from OCM
          apiserver:
            replicaCount: ${schema.spec.apiServerReplicas}
            image:
              repository: ${resources.apiserverImageResource.status.access.imageReference | split(":")[0]}
              tag: ${resources.apiserverImageResource.status.access.imageReference | split(":")[1]}

          renderer:
            image:
              repository: ${resources.rendererImageResource.status.access.imageReference | split(":")[0]}
              tag: ${resources.rendererImageResource.status.access.imageReference | split(":")[1]}

          controller:
            replicaCount: ${schema.spec.controllerReplicas}
            image:
              repository: ${resources.controllerImageResource.status.access.imageReference | split(":")[0]}
              tag: ${resources.controllerImageResource.status.access.imageReference | split(":")[1]}
            args:
              leaderElect: ${schema.spec.controllerReplicas > 1}
            metrics:
              enabled: ${schema.spec.metricsEnabled}
              serviceMonitor:
                enabled: ${schema.spec.prometheusEnabled}

          etcd:
            replicaCount: ${schema.spec.etcdReplicas}
            image:
              repository: ${resources.etcdImageResource.status.access.imageReference | split(":")[0]}
              tag: ${resources.etcdImageResource.status.access.imageReference | split(":")[1]}
            persistence:
              size: ${schema.spec.etcdStorageSize}
              storageClass: ${schema.spec.etcdStorageClass}

          certManager:
            enabled: ${schema.spec.certManagerEnabled}

  status:
    conditions:
      - type: Ready
        reason: AllResourcesReady
        message: "All SolutionArsenal resources are deployed and ready"
