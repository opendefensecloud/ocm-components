name: Release OCM Components

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read # Checkout the repository
      packages: write # Push to ghcr.io
    strategy:
      matrix:
        component:
          - ./argo-workflows
          - ./artifact-conduit
          - ./cert-manager
          - ./cloudnative-pg
          - ./flux
          - ./keycloak
          - ./ocm-demo
          - ./solution-arsenal
          - ./solution-arsenal-discovery
          - ./zot
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up OCM CLI
        uses: open-component-model/ocm-setup-action@8c71929f38d3486e352e5d7aaf813f36accaaf43

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build OCM Component
        run: |
          cd ${{ matrix.component }}
          ocm add componentversion --version ${{ steps.version.outputs.version }} --create --file ./ctf component-constructor.yaml

      - name: Push to GHCR
        run: |
          cd ${{ matrix.component }}
          ocm transfer ctf --copy-local-resources ./ctf ghcr.io/${{ github.repository_owner }}

      - name: Clean up
        if: always()
        run: |
          cd ${{ matrix.component }}
          rm -rf ./ctf
