components:
  - name: opendefense.cloud/arc
    provider:
      name: opendefense.cloud
    labels:
      - name: app.kubernetes.io/name
        value: artifact-conduit
      - name: app.kubernetes.io/component
        value: artifact-gateway
      - name: app.kubernetes.io/part-of
        value: artifact-conduit
    resources:
      # Artifact Conduit (ARC) Helm Chart
      - name: arc-chart
        type: helmChart
        version: v0.2.2
        relation: external
        access:
          type: ociArtifact
          imageReference: ghcr.io/opendefensecloud/charts/arc:v0.2.2

      - name: arc-chart-values-template
        type: yaml
        version: "v0.2.2"
        labels:
          - name: opendefense.cloud/helm/values-for
            value: arc-chart
        relation: local
        input:
          type: file
          path: values.yaml.tpl

      # API Server Container Image
      - name: arc-apiserver-image
        type: ociImage
        version: v0.2.2
        relation: external
        access:
          type: ociArtifact
          imageReference: ghcr.io/opendefensecloud/arc-apiserver:v0.2.2

      # Controller Manager Container Image
      - name: arc-controller-manager-image
        type: ociImage
        version: v0.2.2
        relation: external
        access:
          type: ociArtifact
          imageReference: ghcr.io/opendefensecloud/arc-controller-manager:v0.2.2

      # etcd Container Image
      - name: etcd-image
        type: ociImage
        version: v3.6.11
        relation: external
        access:
          type: ociArtifact
          imageReference: quay.io/coreos/etcd:v3.6.11

      # Minimal Configuration (Single instance, development)
      - name: arc-minimal-config
        type: yaml
        relation: local
        input:
          type: file
          path: minimal-values.yaml

      # Production Configuration (HA with replicas)
      - name: arc-production-config
        type: yaml
        relation: local
        input:
          type: file
          path: production-values.yaml
